<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Administrador de Voladura</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body data-mode="admin">
<header><div><h1>Administrador de Voladura</h1><p>Registra la información y genera el enlace para compartir.</p></div><span class="badge">Admin</span></header>
<main>
<section class="panel"><h2>1. Registrar / actualizar datos</h2><div class="grid">
<label>Nombre de voladura<input id="blastName" type="text" value="Voladura Atocongo"></label>
<label>Este UTM X<input id="utmX" type="number" step="0.001" value="292925.533"></label>
<label>Norte UTM Y<input id="utmY" type="number" step="0.001" value="8651156.600"></label>
<label>Zona UTM<input id="zone" type="number" value="18"></label>
<label>Hemisferio<select id="hemisphere"><option value="S" selected>Sur</option><option value="N">Norte</option></select></label>
<label>Radio equipos (m)<input id="radiusEquipos" type="number" value="300"></label>
<label>Radio personal (m)<input id="radiusPersonal" type="number" value="500"></label>
<label>Fecha<input id="date" type="date"></label>
<label>Hora<input id="time" type="time" value="12:45"></label>
</div><button id="btnPreview">Previsualizar radio</button><button id="btnGenerate" class="primary">Generar enlace de esta voladura</button></section>
<section class="panel"><h2>2. Enlace único para usuarios</h2><textarea id="publicLink" readonly placeholder="Aquí aparecerá el enlace generado para esta voladura"></textarea><button id="btnCopy">Copiar enlace</button><p class="hint">El enlace ahora se genera con la ruta completa de <strong>index.html</strong>.</p></section>
<section class="map-section"><h2>Previsualización del radio</h2><div id="map"></div><p class="hint"><span class="dot green"></span>Radio equipos &nbsp; <span class="dot red"></span>Radio personal</p></section>
</main>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script src="script.js"></script>
</body></html>

<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Administrador | Radio de Voladura V20</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="./styles.css"/>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand side"><span class="logo">U</span><div><b>UNACEM</b><small>RADIO DE VOLADURA</small></div></div>
      <a class="active">Voladuras</a>
      <a href="./usuario.html">Vista usuario</a>
      <a href="./index.html">Inicio</a>
      <div class="legend">
        <h3>Leyenda</h3>
        <p><i class="dot red"></i> Sector de riesgo para equipos</p>
        <p><i class="dot green"></i> Radio de evacuación de personal</p>
        <p><i class="dot blue"></i> Centro de voladura</p>
        <p><i class="line"></i> Dirección de línea de perforación</p>
      </div>
    </aside>

    <main class="workspace">
      <header class="pagebar">
        <h1>Mapa de radios de voladura</h1>
        <div>
          <button id="satBtn" class="tab active">Vista Satelital</button>
          <button id="mapBtn" class="tab">Vista Mapa</button>
        </div>
      </header>

      <section class="admin-grid">
        <div class="map-card">
          <div id="map"></div>
          <div class="coords">Lat: <b id="latInfo">-</b> &nbsp;&nbsp; Lng: <b id="lngInfo">-</b></div>
        </div>

        <aside class="panel">
          <h2>Voladuras del día</h2>

          <div class="blast-card">
            <div class="title-row"><h3>Voladura 1</h3><span>ACTIVA</span></div>
            <label>Centro latitud <input id="v1_lat" type="number" step="0.000001" value="-12.043567"></label>
            <label>Centro longitud <input id="v1_lng" type="number" step="0.000001" value="-76.870123"></label>
            <label>Ángulo de giro <input id="v1_ang" type="number" value="15"></label>
            <label>Radio personas (m) <input id="v1_rp" type="number" value="150"></label>
            <label>Radio equipos (m) <input id="v1_re" type="number" value="300"></label>
            <label>Estado <select id="v1_estado"><option>Programada</option><option>Ejecutada</option><option>Suspendida</option></select></label>
          </div>

          <div class="blast-card">
            <div class="title-row"><h3>Voladura 2</h3><span>ACTIVA</span></div>
            <label>Centro latitud <input id="v2_lat" type="number" step="0.000001" value="-12.048000"></label>
            <label>Centro longitud <input id="v2_lng" type="number" step="0.000001" value="-76.870123"></label>
            <label>Ángulo de giro <input id="v2_ang" type="number" value="195"></label>
            <label>Radio personas (m) <input id="v2_rp" type="number" value="150"></label>
            <label>Radio equipos (m) <input id="v2_re" type="number" value="300"></label>
            <label>Estado <select id="v2_estado"><option>Programada</option><option>Ejecutada</option><option>Suspendida</option></select></label>
          </div>

          <button class="btn primary full" onclick="actualizar()">Actualizar radios</button>
          <button class="btn secondary full" onclick="generarEnlace()">Generar enlace usuario</button>
          <textarea id="shareLink" readonly placeholder="Enlace para compartir"></textarea>
        </aside>
      </section>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="./app.js"></script>
  <script>iniciarAdmin();</script>
</body>
</html>
